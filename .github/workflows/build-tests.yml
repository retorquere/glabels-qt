# This workflow performs test builds across a diversity of supported platforms
#
#     - ubuntu-latest  - gcc
#     - ubuntu-latest  - clang
#     - ubuntu-24.04   - gcc   (For backwards compatablity)
#     - windows-2022   - cl    (build on windows-latest is currently broken - Qt-6.2.4 MSVC incompatability)
#     - macos-latest   - clang
#
      

name: Multi-Platform Build Tests

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            package_suffix: linux-gcc
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            package_suffix: linux-clang
          - os: ubuntu-22.04
            c_compiler: gcc
            cpp_compiler: g++
            package_suffix: ubuntu-22.04-gcc
          - os: windows-2022
            c_compiler: cl
            cpp_compiler: cl
            package_suffix: windows-msvc
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            package_suffix: macos-clang

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Checkout full-depth to facilitate auto versioning
        fetch-depth: 0

    - name: Install optional dependencies (Ubuntu)
      if: startsWith( matrix.os, 'ubuntu-' )
      shell: bash
      run: |
        # install packages
        sudo apt-get update
        sudo apt-get -y install xvfb
        sudo apt-get -y install pkgconf libqrencode-dev
        sudo apt-get -y install barcode
        # install zint-2.15.0 from source
        wget https://downloads.sourceforge.net/project/zint/zint/2.15.0/zint-2.15.0-src.tar.gz && tar xzf zint-2.15.0-src.tar.gz && ( cd zint-2.15.0-src && mkdir build && cd build && cmake .. && make && sudo make install )

    - name: Pre-install vcpkg (Windows)
      if: startsWith( matrix.os, 'windows-' )
      shell: bash
      run: |
        git clone --depth 1 https://github.com/microsoft/vcpkg.git

    - name: Restore vcpkg cache (Windows)
      if: startsWith(matrix.os, 'windows-')
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg/installed
          ${{ github.workspace }}/vcpkg/downloads
        key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build-tests.yml') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Install optional dependencies (Windows)
      if: startsWith( matrix.os, 'windows-' )
      shell: bash
      run: |
        # install packages
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install pkgconf
        ./vcpkg/vcpkg install zlib
        ./vcpkg/vcpkg install libqrencode
        ./vcpkg/vcpkg install zint
        echo "TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

    - name: Install optional dependencies (MacOS)
      if: startsWith( matrix.os, 'macos-' )
      shell: bash
      run: |
        # install packages
        brew install zlib
        brew install qrencode
        brew install zint

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.2.*'
        install-deps: 'true'
        archives: 'qtbase qtsvg qttools icu qttranslations qtwayland'

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "package-dir=${{ github.workspace }}/dist" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

    - name: Test (Ubuntu)
      if: startsWith( matrix.os, 'ubuntu-' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        xvfb-run -a ./glabels/glabels-qt --Version
        xvfb-run -a ctest --build-config Release

    - name: Test (Windows)
      if: startsWith( matrix.os, 'windows-' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      env:
        QT_ASSUME_STDERR_HAS_CONSOLE: 1
      run: |
        ./glabels-batch/Release/glabels-batch-qt --Version
        ctest --build-config Release

    - name: Test (MacOS)
      if: startsWith( matrix.os, 'macos-' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        ./glabels/glabels-qt.app/Contents/MacOS/glabels-qt --Version
        ctest --build-config Release

    - name: Install render test dependencies (Ubuntu-latest)
      if: startsWith( matrix.os, 'ubuntu-latest' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        sudo apt-get -y install xwayland-run
        sudo apt-get -y install comparepdf

    - name: Install render test dependencies (Windows)
      if: startsWith( matrix.os, 'windows' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        choco install diff-pdf

    - name: Install render test dependencies (MacOS)
      if: startsWith( matrix.os, 'macos' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        brew install diff-pdf

    - name: Render tests (Ubuntu-latest)
      if: startsWith( matrix.os, 'ubuntu-latest' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      shell: bash
      env:
        TEST_DIR: ${{ github.workspace }}/test-data
      run: |
        set +e
        run-x() { xvfb-run -a "$@"; }
        run-w() { wlheadless-run -c weston --log=/dev/null -- "$@"; }
        #
        #
        echo "================"
        echo "X11 render tests"
        echo "================"
        run-x ./glabels-batch/glabels-batch-qt --Version
        #
        # echo "-- Available fonts (X) -------------------------------------------------"
        # run-x fc-list : family
        # echo "------------------------------------------------------------------------"
        #
        echo "-----------------------------------"
        run-x ./glabels-batch/glabels-batch-qt -o simple-shapes-x.pdf "$TEST_DIR/simple-shapes.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-shapes.pdf" simple-shapes-x.pdf
        echo "-----------------------------------"
        run-x ./glabels-batch/glabels-batch-qt -o simple-code39-x.pdf "$TEST_DIR/simple-code39.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-code39.pdf" simple-code39-x.pdf
        echo "-----------------------------------"
        run-x ./glabels-batch/glabels-batch-qt -o simple-text-liberation-sans-x.pdf "$TEST_DIR/simple-text-liberation-sans.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-text-liberation-sans.pdf" simple-text-liberation-sans-x.pdf
        echo "-----------------------------------"
        run-x ./glabels-batch/glabels-batch-qt -o simple-text-liberation-serif-x.pdf "$TEST_DIR/simple-text-liberation-serif.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-text-liberation-serif.pdf" simple-text-liberation-serif-x.pdf
        echo "-----------------------------------"
        #
        #
        echo "===================="
        echo "Wayland render tests"
        echo "===================="
        run-w ./glabels-batch/glabels-batch-qt --Version
        #
        # echo "-- Available fonts (X) -------------------------------------------------"
        # run-w fc-list : family
        # echo "------------------------------------------------------------------------"
        #
        echo "-----------------------------------"
        run-w ./glabels-batch/glabels-batch-qt -o simple-shapes-w.pdf "$TEST_DIR/simple-shapes.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-shapes.pdf" simple-shapes-w.pdf
        echo "-----------------------------------"
        run-w ./glabels-batch/glabels-batch-qt -o simple-code39-w.pdf "$TEST_DIR/simple-code39.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-code39.pdf" simple-code39-w.pdf
        echo "-----------------------------------"
        run-w ./glabels-batch/glabels-batch-qt -o simple-text-liberation-sans-w.pdf "$TEST_DIR/simple-text-liberation-sans.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-text-liberation-sans.pdf" simple-text-liberation-sans-w.pdf
        echo "-----------------------------------"
        run-w ./glabels-batch/glabels-batch-qt -o simple-text-liberation-serif-w.pdf "$TEST_DIR/simple-text-liberation-serif.glabels"
        comparepdf -ca -v2 "$TEST_DIR/simple-text-liberation-serif.pdf" simple-text-liberation-serif-w.pdf
        echo "-----------------------------------"

    - name: Render tests (Windows)
      if: startsWith( matrix.os, 'windows' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      shell: pwsh
      env:
        TEST_DIR: ${{ github.workspace }}/test-data
        QT_ASSUME_STDERR_HAS_CONSOLE: 1
      run: |
        set +e
        ./glabels-batch/Release/glabels-batch-qt --Version
        echo "-----------------------------------"
        ./glabels-batch/Release/glabels-batch-qt -o simple-shapes-windows.pdf "$env:TEST_DIR/simple-shapes.glabels" 2>&1
        diff-pdf -v "$env:TEST_DIR/simple-shapes.pdf" simple-shapes-windows.pdf 2>&1
        echo "-----------------------------------"
        ./glabels-batch/Release/glabels-batch-qt -o simple-code39-windows.pdf "$env:TEST_DIR/simple-code39.glabels" 2>&1
        diff-pdf -v "$env:TEST_DIR/simple-code39.pdf" simple-code39-windows.pdf 2>&1
        echo "-----------------------------------"
        #
        # TODO: Create text-based rendering tests using fonts available on Windows
        #

    - name: Render tests (MacOS)
      if: startsWith( matrix.os, 'macos' )
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      shell: bash
      env:
        TEST_DIR: ${{ github.workspace }}/test-data
      run: |
        set +e
        ./glabels-batch/glabels-batch-qt --Version
        echo "-----------------------------------"
        ./glabels-batch/glabels-batch-qt -o simple-shapes-mac.pdf "$TEST_DIR/simple-shapes.glabels"
        diff-pdf -v "$TEST_DIR/simple-shapes.pdf" simple-shapes-mac.pdf
        echo "-----------------------------------"
        ./glabels-batch/glabels-batch-qt -o simple-code39-mac.pdf "$TEST_DIR/simple-code39.glabels"
        diff-pdf -v "$TEST_DIR/simple-code39.pdf" simple-code39-mac.pdf
        echo "-----------------------------------"
        #
        # TODO: Create text-based rendering tests using fonts available on MacOS
        #

    - name: Package binaries (Linux)
      if: always() && startsWith( matrix.os, 'ubuntu-' )
      shell: bash
      run: |
        mkdir -p "${{ steps.strings.outputs.package-dir }}"
        tar -C "${{ steps.strings.outputs.build-output-dir }}" -czf "${{ steps.strings.outputs.package-dir }}/glabels-qt-${{ matrix.package_suffix }}.tar.gz" \
          glabels/glabels-qt \
          glabels-batch/glabels-batch-qt

    - name: Deploy and package app bundle (MacOS)
      if: always() && startsWith( matrix.os, 'macos-' )
      shell: bash
      run: |
        mkdir -p "${{ steps.strings.outputs.package-dir }}"
        mkdir -p "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app/Contents/Resources/share/glabels-qt/translations"
        mkdir -p "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app/Contents/Resources/share/glabels-qt/templates"
        cp "${{ steps.strings.outputs.build-output-dir }}/translations/"*.qm "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app/Contents/Resources/share/glabels-qt/translations/"
        cp "${{ github.workspace }}/templates/"*.xml "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app/Contents/Resources/share/glabels-qt/templates/"
        cp "${{ github.workspace }}/templates/"*.dtd "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app/Contents/Resources/share/glabels-qt/templates/"
        macdeployqt "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app" -verbose=0
        codesign --force --deep --sign - "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app"
        codesign --verify --deep --strict --verbose=2 "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app"
        ditto -c -k --keepParent \
          "${{ steps.strings.outputs.build-output-dir }}/glabels/glabels-qt.app" \
          "${{ steps.strings.outputs.package-dir }}/glabels-qt-${{ matrix.package_suffix }}.zip"

    - name: Verify packaged app bundle (MacOS)
      if: always() && startsWith( matrix.os, 'macos-' )
      shell: bash
      run: |
        rm -rf "${{ runner.temp }}/glabels-qt.app"
        ditto -x -k \
          "${{ steps.strings.outputs.package-dir }}/glabels-qt-${{ matrix.package_suffix }}.zip" \
          "${{ runner.temp }}"
        codesign --verify --deep --strict --verbose=2 "${{ runner.temp }}/glabels-qt.app"
        "${{ runner.temp }}/glabels-qt.app/Contents/MacOS/glabels-qt" --Version

    - name: Package binaries (Windows)
      if: always() && startsWith( matrix.os, 'windows-' )
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ steps.strings.outputs.package-dir }}" | Out-Null
        Compress-Archive -Path "${{ steps.strings.outputs.build-output-dir }}/glabels/Release/*", "${{ steps.strings.outputs.build-output-dir }}/glabels-batch/Release/*" -DestinationPath "${{ steps.strings.outputs.package-dir }}/glabels-qt-${{ matrix.package_suffix }}.zip" -Force

    - name: Stage release package
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-package-${{ matrix.package_suffix }}
        path: ${{ steps.strings.outputs.package-dir }}/glabels-qt-${{ matrix.package_suffix }}.*
        retention-days: 1

    - name: Upload render tests for manual inspection
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: render-tests-${{ matrix.os }}-${{ matrix.cpp_compiler }}-${{ github.run_number }}
        path: ${{ steps.strings.outputs.build-output-dir }}/*.pdf


#    - name: Tmate
#      uses: mxschmitt/action-tmate@v3
#      if: failure()

  publish-development-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download staged packages
      uses: actions/download-artifact@v4
      with:
        pattern: release-package-*
        merge-multiple: true
        path: dist

    - name: Move development tag to current commit
      shell: bash
      run: |
        git tag -f development "${GITHUB_SHA}"
        git push origin refs/tags/development --force

    - name: Create or update development prerelease
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view development >/dev/null 2>&1; then
          gh release edit development --title development --notes "Latest successful development build binaries." --prerelease
        else
          gh release create development --title development --notes "Latest successful development build binaries." --prerelease
        fi

    - name: Remove previous development assets
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view development --json assets --jq '.assets[].name' | while IFS= read -r asset_name; do
          [[ -n "$asset_name" ]] || continue
          gh release delete-asset development "$asset_name" --yes
        done

    - name: Upload latest development assets
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload development dist/* --clobber

